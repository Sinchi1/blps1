server:
  port: 8080

spring:
  application:
    name: bank-service
  datasource:
#    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5434/bankSchema}
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:54111/bankSchema}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout:    5000
        loggerLevel: full