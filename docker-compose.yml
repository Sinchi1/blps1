services:
  postgres:
    image: postgres:latest
    container_name: bank
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bankSchema
    volumes:
      - postgres_data:/var/lib/postgresql

  postgres-1:
    image: postgres:latest
    container_name: fastPayment
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastPaymentSchema
    volumes:
      - postgres_data1:/var/lib/postgresql

volumes:
  postgres_data:
  postgres_data1:
